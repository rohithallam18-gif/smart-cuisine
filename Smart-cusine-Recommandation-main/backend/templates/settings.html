<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Smart Cuisine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        h2 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #818cf8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #6366f1;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        .btn-submit {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            margin-top: 20px;
        }

        .error-text {
            color: #ef4444;
            font-size: 11px;
            margin-top: 5px;
            display: none;
        }

        /* Toggle UI */
        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
        }

        .toggle-label p {
            font-size: 14px;
            color: #cbd5e1;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="/home" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
            <h1>⚙️ Settings</h1>
        </header>

        <!-- ACCOUNT -->
        <div class="section">
            <h2><i class="fa-solid fa-user-gear"></i> Account Information</h2>
            <form method="POST" action="/save_settings" id="accountForm">
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" name="name" value="{{ user.name if user else '' }}" placeholder="Enter your name">
                </div>
                <div class="form-group">
                    <label>Phone Number (India)</label>
                    <input type="text" name="phone" id="phoneInput" value="{{ user.phone if user else '' }}" placeholder="10-digit mobile number">
                    <p id="phoneError" class="error-text">Please enter a valid 10-digit Indian number (starts with 6-9)</p>
                </div>
                <button type="submit" class="btn-submit">Save Account Changes</button>
            </form>
        </div>

        <!-- PREFERENCES -->
        <div class="section">
            <h2><i class="fa-solid fa-sliders"></i> AI & Discovery Preferences</h2>
            <form method="POST" action="/save_preferences">
                <div class="form-group">
                    <label>Food Dietary Type</label>
                    <select name="food_type">
                        <option value="Veg" {% if session.get('food_type') == 'Veg' %}selected{% endif %}>Vegetarian Only</option>
                        <option value="Non-Veg" {% if session.get('food_type') == 'Non-Veg' %}selected{% endif %}>Non-Vegetarian</option>
                        <option value="Both" {% if session.get('food_type') == 'Both' or not session.get('food_type') %}selected{% endif %}>No Preference</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Preferred Cuisine</label>
                    <select name="cuisine">
                        <option value="Indian" {% if session.get('cuisine') == 'Indian' %}selected{% endif %}>Indian</option>
                        <option value="Chinese" {% if session.get('cuisine') == 'Chinese' %}selected{% endif %}>Chinese</option>
                        <option value="Italian" {% if session.get('cuisine') == 'Italian' %}selected{% endif %}>Italian</option>
                        <option value="Continental" {% if session.get('cuisine') == 'Continental' %}selected{% endif %}>Continental</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Update Preferences</button>
            </form>
        </div>

        <!-- DATA MANAGEMENT -->
        <div class="section">
            <h2><i class="fa-solid fa-trash-can"></i> Danger Zone</h2>
            <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Once you clear your data, it cannot be undone.</p>
            <form method="POST" action="/clear_favorites">
                <button type="submit" class="btn-submit btn-danger" onclick="return confirm('Clear all favorite restaurants?')">
                    Clear All Favorites
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('accountForm').onsubmit = function() {
            const phone = document.getElementById('phoneInput').value.trim();
            const error = document.getElementById('phoneError');
            const phoneRegex = /^[6-9]\d{9}$/;

            if (phone && !phoneRegex.test(phone)) {
                error.style.display = 'block';
                return false;
            }
            error.style.display = 'none';
            return true;
        };
    </script>

</body>
</html>
