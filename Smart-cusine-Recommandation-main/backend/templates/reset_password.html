<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Cuisine - Reset Password</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, rgba(15, 23, 42, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%), url('/static/images/best_cuisine_bg.png');
        background-size: cover;
        background-position: center;
        overflow: hidden;
    }
    .card {
        width: 420px;
        padding: 40px;
        background: rgba(15, 23, 42, 0.85);
        backdrop-filter: blur(20px);
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        position: relative;
        z-index: 10;
    }
    h1 { color: #f97316; margin-bottom: 5px; }
    .subtitle { color: #cbd5e1; margin-bottom: 30px; font-size: 14px; }
    input {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.03);
        color: white;
        outline: none;
        transition: 0.3s;
    }
    input:focus {
        border-color: #f97316;
        background: rgba(255, 255, 255, 0.07);
    }
    button {
        width: 100%;
        padding: 14px;
        margin-top: 25px;
        background: linear-gradient(135deg, #f97316, #fb923c);
        border: none;
        color: white;
        border-radius: 12px;
        cursor: pointer;
        font-weight: bold;
        font-size: 16px;
        transition: 0.4s;
    }
    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
    }
    #msg { margin-top: 15px; font-size: 14px; }
    .error { color: #ef4444; }
    .success { color: #10b981; }
</style>
</head>
<body>
    <div class="card">
        <h1>Set New Password</h1>
        <div class="subtitle">Choose a strong password</div>
        
        <input type="password" id="password" placeholder="New Password">
        <input type="password" id="confirmPassword" placeholder="Confirm New Password">
        
        <button onclick="handleReset()">Reset Password</button>
        
        <div id="msg"></div>
    </div>

    <script>
        async function handleReset() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const msgDiv = document.getElementById('msg');

            if (!password || !confirmPassword) {
                msgDiv.innerHTML = '<span class="error">All fields are required</span>';
                return;
            }

            if (password !== confirmPassword) {
                msgDiv.innerHTML = '<span class="error">Passwords do not match</span>';
                return;
            }

            if (password.length < 6) {
                msgDiv.innerHTML = '<span class="error">Password too short (min 6 chars)</span>';
                return;
            }

            try {
                const res = await fetch('/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();

                if (data.status === 'success') {
                    msgDiv.innerHTML = '<span class="success">Password reset successfully!</span>';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    msgDiv.innerHTML = `<span class="error">${data.message}</span>`;
                }
            } catch (err) {
                msgDiv.innerHTML = '<span class="error">Something went wrong.</span>';
            }
        }
    </script>
</body>
</html>
